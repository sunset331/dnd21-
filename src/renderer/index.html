<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DND Dice Pet</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/dice.css">
  <link rel="stylesheet" href="../styles/animations.css">
  <link rel="stylesheet" href="../styles/particles.css">
  <link rel="stylesheet" href="../styles/popup.css">
  <link rel="stylesheet" href="../styles/ui.css">
  <link rel="stylesheet" href="../styles/settings.css">
</head>
<body>
  <div id="app">
    <div id="drag-handle"></div>

    <div id="status-bar" class="hidden">
      <div id="status-list"></div>
    </div>

    <div id="stage-indicator">
      <span class="stage-dot active" data-stage="0"></span>
      <span class="stage-line"></span>
      <span class="stage-dot" data-stage="1"></span>
      <span class="stage-line"></span>
      <span class="stage-dot" data-stage="2"></span>
    </div>

    <div id="event-display" class="hidden">
      <p id="event-text"></p>
    </div>

    <!-- ─── Dice ─── -->
    <div class="dice-wrapper" id="dice-wrapper">
      <svg class="dice-svg" viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="f-top" x1="0" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#d4b0f0"/><stop offset="100%" stop-color="#8b60c0"/>
          </linearGradient>
          <linearGradient id="f-left" x1="0" y1="0" x2="1" y2="0.8">
            <stop offset="0%" stop-color="#b080d8"/><stop offset="100%" stop-color="#6b4098"/>
          </linearGradient>
          <linearGradient id="f-right" x1="0.3" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#c090e0"/><stop offset="100%" stop-color="#7850a8"/>
          </linearGradient>
          <linearGradient id="f-mid" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a070c8"/><stop offset="100%" stop-color="#5b3a8c"/>
          </linearGradient>
          <linearGradient id="f-lower" x1="0.5" y1="0" x2="0.5" y2="1">
            <stop offset="0%" stop-color="#7b50b0"/><stop offset="100%" stop-color="#3a2068"/>
          </linearGradient>
          <linearGradient id="f-dark" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#5b3a8c"/><stop offset="100%" stop-color="#251845"/>
          </linearGradient>
          <filter id="die-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
            <feColorMatrix in="blur" type="matrix"
              values="0 0 0 0 0.55  0 0 0 0 0.30  0 0 0 0 0.85  0 0 0 0.6 0" result="colored"/>
            <feMerge><feMergeNode in="colored"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="facet-shadow">
            <feDropShadow dx="0.5" dy="0.5" stdDeviation="0.8" flood-color="#1a1030" flood-opacity="0.4"/>
          </filter>
        </defs>
        <ellipse cx="80" cy="88" rx="65" ry="78" fill="rgba(26,16,48,0.02)" stroke="none"/>
        <polygon points="80,18 45,55 55,75" fill="url(#f-dark)" opacity="0.55"/>
        <polygon points="80,18 115,55 105,75" fill="url(#f-dark)" opacity="0.55"/>
        <polygon points="45,55 30,95 55,75 65,110" fill="url(#f-dark)" opacity="0.5"/>
        <polygon points="115,55 130,95 105,75 95,110" fill="url(#f-dark)" opacity="0.5"/>
        <polygon points="80,12 105,45 80,58 55,45" fill="url(#f-top)" filter="url(#facet-shadow)"/>
        <polygon points="55,45 80,58 75,82 50,68" fill="url(#f-left)" filter="url(#facet-shadow)"/>
        <polygon points="105,45 80,58 85,82 110,68" fill="url(#f-right)" filter="url(#facet-shadow)"/>
        <polygon points="50,68 75,82 68,112 42,90" fill="url(#f-mid)" filter="url(#facet-shadow)"/>
        <polygon points="110,68 85,82 92,112 118,90" fill="url(#f-mid)" filter="url(#facet-shadow)"/>
        <polygon points="42,90 68,112 72,140 55,135 38,115" fill="url(#f-lower)" filter="url(#facet-shadow)"/>
        <polygon points="118,90 92,112 88,140 105,135 122,115" fill="url(#f-lower)" filter="url(#facet-shadow)"/>
        <polygon points="80,12 55,45 65,38" fill="url(#f-top)" opacity="0.8"/>
        <polygon points="80,12 105,45 95,38" fill="url(#f-top)" opacity="0.8"/>
        <polygon points="72,140 88,140 80,158" fill="url(#f-lower)" filter="url(#facet-shadow)"/>
        <polygon points="55,135 72,140 80,158 62,148" fill="url(#f-dark)" filter="url(#facet-shadow)"/>
        <polygon points="105,135 88,140 80,158 98,148" fill="url(#f-dark)" filter="url(#facet-shadow)"/>
        <path d="M80,12 L105,45 L80,58 L55,45 Z" class="crystal-edge"/>
        <path d="M55,45 L50,68 L42,90 M50,68 L75,82" class="crystal-edge"/>
        <path d="M105,45 L110,68 L118,90 M110,68 L85,82" class="crystal-edge"/>
        <path d="M80,12 L80,58 L80,158" class="crystal-edge-bright"/>
        <path d="M42,90 L68,112 L72,140 L55,135" class="crystal-edge"/>
        <path d="M118,90 L92,112 L88,140 L105,135" class="crystal-edge"/>
        <path d="M72,140 L80,158 L88,140" class="crystal-edge-bright"/>
        <ellipse cx="80" cy="88" rx="22" ry="14" class="dice-number-bg"/>
        <text x="80" y="88" class="dice-number" id="dice-number">?</text>
      </svg>
    </div>

    <button id="action-btn" class="action-btn action-btn--event">
      <span id="btn-label">遭遇事件</span>
    </button>
    <p id="btn-hint">右键骰子打开菜单</p>

    <div id="mood-quote" class="mood-quote"></div>
  </div><!-- /app -->

  <!-- Settings panel (hidden, opened via right-click menu) -->
  <div id="settings-menu" class="settings-menu" style="display:none">
    <div class="settings-header">⚙ 地下城设置</div>
    <div class="settings-section">
      <div class="settings-section-title">窗口</div>
      <label class="settings-row"><span>始终置顶</span><input type="checkbox" id="set-always-on-top" checked></label>
      <label class="settings-row"><span>锁定位置</span><input type="checkbox" id="set-locked"></label>
      <div class="settings-row"><span>透明度</span><input type="range" id="set-opacity" min="30" max="100" value="100"></div>
      <div class="settings-row"><span>缩放</span><input type="range" id="set-scale" min="60" max="150" value="100"></div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">行为</div>
      <label class="settings-row"><span>空闲台词</span><input type="checkbox" id="set-idle-speech" checked></label>
      <label class="settings-row"><span>音效</span><input type="checkbox" id="set-sound" checked></label>
      <label class="settings-row"><span>夜间静音</span><input type="checkbox" id="set-night-mute"></label>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">显示</div>
      <label class="settings-row"><span>状态栏</span><input type="checkbox" id="set-show-status" checked></label>
      <label class="settings-row"><span>动画效果</span><input type="checkbox" id="set-animations" checked></label>
    </div>
    <button id="settings-close" class="settings-close-btn">关闭菜单</button>
  </div>

  <script src="audio.js"></script>
  <script src="scenario.js"></script>
  <script src="status.js"></script>
  <script src="mood.js"></script>
  <script src="animation.js"></script>
  <script src="result-popup.js"></script>
  <script src="dice.js"></script>
  <script src="ui-manager.js"></script>
  <script src="achievements.js"></script>
  <script src="adventure-log.js"></script>
  <script src="ghost.js"></script>
  <script src="context-menu.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
